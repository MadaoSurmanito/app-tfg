services:
  db:
    image: postgres:16
    container_name: kinestilistas_db
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kinestilistas_tunnel
    command: tunnel --no-autoupdate --url http://host.docker.internal:3000
    restart: unless-stopped

volumes:
  db_data: